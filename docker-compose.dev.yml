# Local development services (no k3s needed).
#   Postgres  → app database
#   MinIO     → S3-compatible object storage (buckets: profile-pics, videos, calculated-rounds)
#   Mailpit   → catches OTP emails; read codes at http://localhost:8025
#
# Start:  pnpm dev:infra      (docker compose -f docker-compose.dev.yml up -d)
# Stop:   pnpm dev:infra:down
name: arena-dev

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arena"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the buckets and make profile-pics publicly readable.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/profile-pics;
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/calculated-rounds;
      mc anonymous set download local/profile-pics;
      echo 'buckets ready';
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI — read OTP codes here
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  postgres-data:
  minio-data:
